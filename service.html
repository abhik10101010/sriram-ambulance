body {

header img {width:80px; border-radius:10px;}

.hero-section h2 {font-size:20px; margin-bottom:15px;}

button {width:100%; padding:15px; margin:5px 0; font-size:16px; border:none; border-radius:5px; cursor:pointer; font-weight:bold; transition:0.3s; box-shadow:0 4px 6px rgba(0,0,0,0.3);}

select, input {width:100%; padding:10px; margin:5px 0; border-radius:5px; border:none;}
.submit-btn {background:#ff5722; cursor:pointer; font-weight:bold;}
p.note {text-align:center; font-size:14px; color:#ccc; margin-top:5px;}
/* Footer */
footer {text-align:center; margin-top:20px; font-size:14px; color:#ffeb3b; padding:10px 0; border-top:1px solid #fff;}
/* Responsive */
@media(max-width:600px){header{flex-direction:column;text-align:center;} header .contact{margin-top:5px;}}

<body>

<script>
// Toggle Call Options
function toggleCallOptions() {
  var div = document.getElementById('callOptions');
  div.style.display = (div.style.display === 'none') ? 'block' : 'none';
}

// Send Inquiry to WhatsApp
function sendWhatsApp() {
  var type = document.getElementById('ambulanceType').value;
  var state = document.getElementById('state').value;
  var district = document.getElementById('district').value;
  var city = document.getElementById('city').value;
  var mobile = document.getElementById('mobile').value;
  if(city=="" || mobile==""){alert("Please fill all fields"); return;}
  var message = `I need ${type} in ${state}, ${district}, ${city}. My mobile: ${mobile}`;
  var whatsappNumber = "918544041646";
  var url = `https://wa.me/${whatsappNumber}?text=${encodeURIComponent(message)}`;
  window.open(url,'_blank');
}
</script>
